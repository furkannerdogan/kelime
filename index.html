<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e1b4b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kelime">
<link rel="manifest" href="manifest.json">
<title>Kelime Defteri</title>
<style>
  :root{--bg:#f1f2f4;--line:#cbd2da;--ink:#0f172a;--mute:#64748b;--accent:#1e1b4b;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding-top:env(safe-area-inset-top);padding-bottom:calc(16px + env(safe-area-inset-bottom))}
  .wrap{max-width:760px;margin:0 auto;padding:16px}
  header{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2px solid var(--ink);padding-bottom:8px}
  h1{font-family:Georgia,serif;font-size:26px;margin:0}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mute)}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  input,select,textarea{border:1px solid var(--line);border-radius:6px;padding:9px;background:#fff;font-size:16px;font-family:inherit;width:100%}
  textarea{font-family:ui-monospace,monospace;font-size:12px}
  button{font-family:ui-monospace,Menlo,monospace;font-size:12px;text-transform:uppercase;letter-spacing:.08em;
    border:1px solid var(--line);background:#fff;border-radius:6px;padding:10px 12px;cursor:pointer;color:var(--ink)}
  button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.dark{background:#0f172a;color:#fff;border-color:#0f172a}
  .chip{padding:6px 10px}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;margin-top:12px}
  .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .word{font-family:Georgia,serif;font-size:26px;margin:0}
  .tr{font-family:Georgia,serif;font-size:17px;color:var(--accent);margin:4px 0 0}
  .lvl{border:1px solid;border-radius:4px;padding:2px 6px;font-family:ui-monospace,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em}
  .kolay{background:#ecfdf5;color:#047857;border-color:#a7f3d0}
  .orta{background:#fffbeb;color:#b45309;border-color:#fde68a}
  .zor{background:#fff1f2;color:#be123c;border-color:#fecdd3}
  hr{border:0;border-top:1px solid #e2e8f0;margin:12px 0}
  .tag{display:inline-block;border:1px solid;border-radius:4px;padding:2px 7px;font-size:13px;margin:0 6px 6px 0}
  .tag.s{background:#ecfdf5;color:#047857;border-color:#a7f3d0}
  .tag.a{background:#fff1f2;color:#be123c;border-color:#fecdd3}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:520px){.cols,.grid2{grid-template-columns:1fr}}
  .ex{border-left:2px solid var(--line);padding-left:10px;font-style:italic;color:#334155;margin-top:12px}
  .grade{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
  .grade button{padding:12px 4px;font-size:11px}
  .g1{border-color:#fecdd3;color:#be123c}
  .g2{border-color:#fed7aa;color:#c2410c}
  .g3{border-color:#a7f3d0;color:#047857}
  .g4{border-color:#bfdbfe;color:#1d4ed8}
  .due{font-family:ui-monospace,monospace;font-size:9px;color:#94a3b8;display:block;margin-top:2px}
  .del{border:0;color:#94a3b8;background:none;padding:2px;font-size:11px}
  .hidden{display:none}
  footer{margin-top:28px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Kelime Defteri</h1>
    <span class="mono" id="count"></span>
  </header>

  <div class="row">
    <button id="mStudy" class="on" style="flex:1">çalış</button>
    <button id="mList" style="flex:1">sözlük</button>
    <button id="mAdd" style="flex:1">+ ekle</button>
  </div>

  <!-- ÇALIŞ -->
  <section id="study">
    <div class="mono" id="sStat" style="margin-top:12px"></div>
    <div class="card" id="sCard" style="min-height:200px"></div>
    <div id="sReveal" class="row"><button id="sShow" style="flex:1" class="dark">cevabı göster</button></div>
    <div id="sGrades" class="grade hidden">
      <button class="g1" data-g="1">bilmedim<span class="due" id="d1"></span></button>
      <button class="g2" data-g="2">zor<span class="due" id="d2"></span></button>
      <button class="g3" data-g="3">iyi<span class="due" id="d3"></span></button>
      <button class="g4" data-g="4">kolay<span class="due" id="d4"></span></button>
    </div>
  </section>

  <!-- SÖZLÜK -->
  <section id="list" class="hidden">
    <div class="row"><input id="q" placeholder="İngilizce veya Türkçe ara…"></div>
    <div class="row">
      <button class="chip on" data-lvl="hepsi">hepsi</button>
      <button class="chip" data-lvl="kolay">kolay</button>
      <button class="chip" data-lvl="orta">orta</button>
      <button class="chip" data-lvl="zor">zor</button>
    </div>
    <div id="listBody"></div>
  </section>

  <!-- EKLE -->
  <section id="add" class="hidden">
    <div class="row">
      <button id="tForm" class="dark">form</button>
      <button id="tJson">json</button>
      <button id="tExp">yedek</button>
    </div>

    <div id="secForm" class="card">
      <div class="grid2">
        <div><span class="mono">kelime / deyim *</span><input id="fW"></div>
        <div><span class="mono">türkçe karşılık *</span><input id="fTr"></div>
        <div><span class="mono">tür (verb, adj, idiom…)</span><input id="fPos"></div>
        <div><span class="mono">seviye</span><select id="fLvl"><option>kolay</option><option selected>orta</option><option>zor</option></select></div>
      </div>
      <div style="margin-top:10px"><span class="mono">ingilizce tanım</span><input id="fEn"></div>
      <div class="grid2" style="margin-top:10px">
        <div><span class="mono">eş anlamlılar (virgülle)</span><input id="fSyn"></div>
        <div><span class="mono">zıt anlamlılar (virgülle)</span><input id="fAnt"></div>
      </div>
      <div style="margin-top:10px"><span class="mono">örnek cümle</span><input id="fEx"></div>
      <button id="fAdd" class="on" style="margin-top:12px">kelimeyi ekle</button>
    </div>

    <div id="secJson" class="card hidden">
      <span class="mono">json yapıştır (tek kayıt veya liste)</span>
      <textarea id="jIn" rows="7" placeholder='[{"w":"get (a)hold of","pos":"idiom","lvl":"orta","en":"...","tr":"...","syn":["reach"],"ant":[],"ex":"..."}]'></textarea>
      <button id="jAdd" class="on" style="margin-top:8px">içe aktar</button>
    </div>

    <div id="secExp" class="card hidden">
      <span class="mono">yedek: eklediğin kelimeler + tekrar geçmişi</span>
      <textarea id="eOut" rows="6" readonly></textarea>
      <div class="row">
        <button id="eDl">dosyaya indir</button>
        <button id="eCopy">panoya kopyala</button>
      </div>
      <span class="mono" style="display:block;margin-top:14px">yedekten geri yükle</span>
      <input type="file" id="eFile" accept=".json,application/json" style="border:0;padding:6px 0">
    </div>
    <p id="msg" class="mono"></p>
  </section>

  <footer class="mono" id="foot"></footer>
</div>

const DAY = 864e5, MIN = 6e4;

const S = {custom:[], srs:{}, q:"", lvl:"hepsi", mode:"study", cur:null, open:false, storeOK:true};
const $ = id => document.getElementById(id);
const msg = t => { $("msg").textContent = t || ""; };

function load(){
  try{
    S.custom = JSON.parse(localStorage.getItem("kd_custom") || "[]");
    S.srs = JSON.parse(localStorage.getItem("kd_srs") || "{}");
  }catch(e){ S.storeOK = false; }
}
function save(){
  try{
    localStorage.setItem("kd_custom", JSON.stringify(S.custom));
    localStorage.setItem("kd_srs", JSON.stringify(S.srs));
  }catch(e){ S.storeOK=false; msg("Kayıt yapılamadı. Yedek sekmesinden dosyaya indir."); }
}
const all = () => [...S.custom.map(c=>({...c,custom:true})), ...BUILTIN];
const esc = t => String(t==null?"":t).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const tags = (a,c) => (a&&a.length) ? a.map(x=>`<span class="tag ${c}">${esc(x)}</span>`).join("") : '<span style="color:#94a3b8">—</span>';

/* ---------- SM-2 benzeri aralık hesabı ---------- */
function preview(card, g){
  const s = card || {ef:2.5, iv:0, reps:0};
  let ef = s.ef, iv = s.iv, reps = s.reps;
  if(g === 1){ return {ef: Math.max(1.3, ef-0.2), iv: 0, reps: 0, due: Date.now() + 10*MIN}; }
  if(g === 2){ ef = Math.max(1.3, ef-0.15); iv = reps === 0 ? 1 : Math.max(1, Math.round(iv*1.2)); }
  else if(g === 3){ iv = reps === 0 ? 1 : (reps === 1 ? 3 : Math.round(iv*ef)); }
  else { ef = ef + 0.1; iv = reps === 0 ? 3 : Math.round(iv*ef*1.3); }
  iv = Math.min(iv, 365);
  return {ef, iv, reps: reps+1, due: Date.now() + iv*DAY};
}
const fmt = iv => iv === 0 ? "10 dk" : (iv === 1 ? "1 gün" : (iv < 30 ? iv+" gün" : Math.round(iv/30)+" ay"));

function queue(){
  const now = Date.now();
  const due = [], fresh = [];
  all().forEach(it=>{
    const s = S.srs[it.w];
    if(!s) fresh.push(it);
    else if(s.due <= now) due.push(it);
  });
  due.sort((a,b)=>S.srs[a.w].due - S.srs[b.w].due);
  return {due, fresh};
}

function renderStudy(){
  const {due, fresh} = queue();
  $("sStat").textContent = `tekrar: ${due.length} · yeni: ${fresh.length}`;
  if(!S.cur){
    const pool = due.length ? due : fresh;
    if(!pool.length){
      $("sCard").innerHTML = "<p>Şimdilik bitti. Vakti gelen kart yok.</p>";
      $("sReveal").classList.add("hidden"); $("sGrades").classList.add("hidden");
      return;
    }
    S.cur = pool[0]; S.open = false;
  }
  const it = S.cur;
  const head = `<div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap">
      <h3 class="word">${esc(it.w)}</h3><span class="mono">${esc(it.pos)}</span>
      <span class="lvl ${it.lvl}">${it.lvl}</span></div>`;
  $("sCard").innerHTML = S.open
    ? head + `<p class="tr">${esc(it.tr)}</p><p>${esc(it.en)}</p>
        <div style="margin-top:8px">${tags(it.syn,"s")}${tags(it.ant,"a")}</div>
        ${it.ex?`<p class="ex">${esc(it.ex)}</p>`:""}`
    : head + `<p class="mono" style="margin-top:28px">anlamını hatırla, sonra cevabı göster</p>`;
  $("sReveal").classList.toggle("hidden", S.open);
  $("sGrades").classList.toggle("hidden", !S.open);
  if(S.open){
    [1,2,3,4].forEach(g=>{ $("d"+g).textContent = fmt(preview(S.srs[it.w], g).iv); });
  }
}

function grade(g){
  if(!S.cur) return;
  S.srs[S.cur.w] = preview(S.srs[S.cur.w], g);
  save(); S.cur = null; S.open = false; renderStudy(); renderCount();
}

/* ---------- sözlük ---------- */
function filtered(){
  const s = S.q.trim().toLocaleLowerCase("tr");
  return all().filter(it=>{
    if(S.lvl !== "hepsi" && it.lvl !== S.lvl) return false;
    if(!s) return true;
    return [it.w,it.tr,it.en,...(it.syn||[]),...(it.ant||[])].join(" ").toLocaleLowerCase("tr").includes(s);
  });
}
function renderList(){
  const l = filtered();
  $("listBody").innerHTML = l.length ? l.map(it=>{
    const s = S.srs[it.w];
    const st = s ? (s.due<=Date.now() ? "tekrar zamanı" : "sonraki: "+new Date(s.due).toLocaleDateString("tr-TR")) : "henüz çalışılmadı";
    return `<article class="card">
      <div class="head">
        <div>
          <div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap">
            <h3 class="word">${esc(it.w)}</h3><span class="mono">${esc(it.pos)}</span>
            <span class="lvl ${it.lvl}">${it.lvl}</span>
          </div>
          <p class="tr">${esc(it.tr)}</p>
        </div>
        <div style="text-align:right">
          <span class="mono">${st}</span>
          ${it.custom?`<br><button class="del" data-del="${esc(it.w)}">sil</button>`:""}
        </div>
      </div>
      <hr><p>${esc(it.en)}</p>
      <div class="cols">
        <div><div class="mono">eş anlamlı</div>${tags(it.syn,"s")}</div>
        <div><div class="mono">zıt anlamlı</div>${tags(it.ant,"a")}</div>
      </div>
      ${it.ex?`<p class="ex">${esc(it.ex)}</p>`:""}
    </article>`;
  }).join("") : '<p style="margin-top:16px">Eşleşen kelime yok.</p>';
}

function renderCount(){
  const {due, fresh} = queue();
  const learned = Object.keys(S.srs).length;
  $("count").textContent = `${learned}/${all().length} başlandı · ${due.length} tekrar`;
  $("foot").textContent = `${BUILTIN.length} hazır + ${S.custom.length} eklenen · veriler bu cihazda saklanır, ara sıra yedek al`;
  $("eOut").value = JSON.stringify({words:S.custom.map(({custom,...r})=>r), srs:S.srs}, null, 1);
}
function render(){ renderCount(); if(S.mode==="study") renderStudy(); if(S.mode==="list") renderList(); }

/* ---------- ekleme ---------- */
function addMany(items){
  const map = new Map(S.custom.map(c=>[c.w.toLowerCase(),c]));
  let fresh = 0;
  items.forEach(it=>{ if(!map.has(it.w.toLowerCase())) fresh++; map.set(it.w.toLowerCase(), it); });
  S.custom = [...map.values()]; save(); render();
  return fresh;
}
const splitList = s => s.split(",").map(x=>x.trim()).filter(Boolean);

function importJSON(text){
  let d; try{ d = JSON.parse(text); } catch(e){ msg("JSON okunamadı."); return; }
  if(d && !Array.isArray(d) && d.words){            // tam yedek dosyası
    if(d.srs && typeof d.srs === "object") S.srs = {...S.srs, ...d.srs};
    d = d.words;
  }
  const arr = Array.isArray(d) ? d : [d];
  const clean = arr.filter(o=>o && typeof o.w==="string" && o.w.trim()).map(o=>({
    w:String(o.w).trim(), pos:String(o.pos||"—"),
    lvl:["kolay","orta","zor"].includes(o.lvl)?o.lvl:"orta",
    en:String(o.en||""), tr:String(o.tr||""),
    syn:Array.isArray(o.syn)?o.syn.map(String):[],
    ant:Array.isArray(o.ant)?o.ant.map(String):[],
    ex:String(o.ex||"")}));
  if(!clean.length){ msg('Geçerli kayıt yok; her kayıtta "w" alanı olmalı.'); return; }
  addMany(clean); msg(`${clean.length} kayıt işlendi.`);
}

/* ---------- olaylar ---------- */
function mode(m){
  S.mode = m;
  ["study","list","add"].forEach(x=>$(x).classList.toggle("hidden", x!==m));
  $("mStudy").className = m==="study"?"on":""; $("mStudy").style.flex="1";
  $("mList").className  = m==="list" ?"on":""; $("mList").style.flex="1";
  $("mAdd").className   = m==="add"  ?"on":""; $("mAdd").style.flex="1";
  render();
}
$("mStudy").onclick=()=>mode("study"); $("mList").onclick=()=>mode("list"); $("mAdd").onclick=()=>mode("add");
$("sShow").onclick=()=>{ S.open=true; renderStudy(); };
$("sCard").onclick=()=>{ if(!S.open && S.cur){ S.open=true; renderStudy(); } };
document.querySelectorAll("[data-g]").forEach(b=>b.onclick=()=>grade(+b.dataset.g));
$("q").oninput=e=>{ S.q=e.target.value; renderList(); };
document.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); S.lvl=b.dataset.lvl; renderList();
});

  const d = e.target.closest("[data-del]");
  if(d){ S.custom = S.custom.filter(c=>c.w!==d.dataset.del); save(); render(); }
});
function tab(n){
  ["Form","Json","Exp"].forEach(t=>{
    $("t"+t).className = t.toLowerCase()===n ? "dark" : "";
    $("sec"+t).classList.toggle("hidden", t.toLowerCase()!==n);
  }); msg("");
}
$("tForm").onclick=()=>tab("form"); $("tJson").onclick=()=>tab("json"); $("tExp").onclick=()=>tab("exp");
$("fAdd").onclick=()=>{
  const w=$("fW").value.trim(), tr=$("fTr").value.trim();
  if(!w||!tr){ msg("Kelime ve Türkçe karşılık zorunlu."); return; }
  const n = addMany([{w, pos:$("fPos").value.trim()||"—", lvl:$("fLvl").value, en:$("fEn").value.trim(), tr,
    syn:splitList($("fSyn").value), ant:splitList($("fAnt").value), ex:$("fEx").value.trim()}]);
  ["fW","fTr","fPos","fEn","fSyn","fAnt","fEx"].forEach(i=>$(i).value="");
  msg(n?"1 kelime eklendi.":"Aynı kelime vardı, güncellendi.");
};
$("jAdd").onclick=()=>{ importJSON($("jIn").value); $("jIn").value=""; };
$("eDl").onclick=()=>{
  const b = new Blob([$("eOut").value], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(b); a.download = "kelime-yedek.json"; a.click(); URL.revokeObjectURL(a.href);
};
$("eCopy").onclick=async()=>{ try{ await navigator.clipboard.writeText($("eOut").value); msg("Kopyalandı."); }catch(e){ msg("Kopyalanamadı, elle seç."); } };
$("eFile").onchange=e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>importJSON(r.result); r.readAsText(f); };

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});

load();
if(!S.storeOK) msg("Bu tarayıcı kaydı engelliyor.");
mode("study");
</script>
